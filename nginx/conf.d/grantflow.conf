# --- Upstream service definitions ---
upstream auth_upstream        { server auth-service:8001;        keepalive 4; }
upstream application_upstream { server application-service:8002;  keepalive 4; }
upstream screening_upstream   { server screening-service:8003;    keepalive 4; }
upstream review_upstream      { server review-service:8004;       keepalive 4; }
upstream award_upstream       { server award-service:8005;        keepalive 4; }
upstream reporting_upstream   { server reporting-service:8006;    keepalive 4; }
upstream comms_upstream       { server comms-service:8007;        keepalive 4; }
upstream admin_upstream       { server admin-service:8008;        keepalive 4; }
upstream frontend_upstream    { server frontend:80;               keepalive 8; }

server {
    listen 80;
    server_name _;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # Auth Service (/api/v1/auth/)
    location /api/v1/auth/ {
        proxy_pass http://auth_upstream;
    }

    # Screening (must precede generic /applications)
    location ~ ^/api/v1/applications/([0-9]+)/screen(ing)?(-report|-decision)? {
        proxy_pass http://screening_upstream;
    }

    # Review (assign, review-package, annotations)
    location ~ ^/api/v1/applications/([0-9]+)/(assign-reviewer|review-package|annotations) {
        proxy_pass http://review_upstream;
    }
    location /api/v1/reviews {
        proxy_pass http://review_upstream;
    }
    location /api/v1/my-reviews {
        proxy_pass http://review_upstream;
    }
    location /api/v1/review-queue {
        proxy_pass http://review_upstream;
    }

    # Award (decision, agreements, tranches, bank-details)
    location ~ ^/api/v1/applications/([0-9]+)/(decision|generate-agreement|tranches|bank-details) {
        proxy_pass http://award_upstream;
    }
    location /api/v1/agreements {
        proxy_pass http://award_upstream;
    }
    location /api/v1/tranches {
        proxy_pass http://award_upstream;
    }

    # Reporting (reports, expenditures, fund-utilisation)
    location ~ ^/api/v1/applications/([0-9]+)/(reports|expenditures|fund-utilisation) {
        proxy_pass http://reporting_upstream;
    }
    location /api/v1/reports {
        proxy_pass http://reporting_upstream;
    }
    location /api/v1/expenditures {
        proxy_pass http://reporting_upstream;
    }

    # Communications (messages, notifications)
    location ~ ^/api/v1/applications/([0-9]+)/messages {
        proxy_pass http://comms_upstream;
    }
    location /api/v1/notifications {
        proxy_pass http://comms_upstream;
    }

    # Admin
    location /api/v1/admin {
        proxy_pass http://admin_upstream;
    }

    # Programmes & Eligibility (part of application-service)
    location /api/v1/programmes {
        proxy_pass http://application_upstream;
    }
    location /api/v1/eligibility-check {
        proxy_pass http://application_upstream;
    }
    location /api/v1/profile {
        proxy_pass http://application_upstream;
    }
    location /api/v1/documents {
        client_max_body_size 25M;
        proxy_pass http://application_upstream;
    }

    # Generic Applications (must be LAST among /api/v1 blocks)
    location /api/v1/applications {
        proxy_pass http://application_upstream;
    }
    location /api/v1/my-applications {
        proxy_pass http://application_upstream;
    }

    # Static file uploads
    location /uploads/ {
        alias /var/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gateway health check
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","gateway":"nginx","version":"1.0.0"}';
    }

    # React SPA catch-all (must be LAST)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend_upstream;
        proxy_set_header X-Original-URI $request_uri;
    }
}
