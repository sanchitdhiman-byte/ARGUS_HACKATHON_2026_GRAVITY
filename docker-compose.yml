version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grantflow
      POSTGRES_USER: ${POSTGRES_USER:-grantflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grantflow_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grantflow} -d grantflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - grantflow-net
    ports:
      - "5432:5432"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads_data:/var/uploads:ro
    depends_on:
      - auth-service
      - application-service
      - screening-service
      - review-service
      - award-service
      - reporting-service
      - comms-service
      - admin-service
      - frontend
    networks:
      - grantflow-net

  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  application-service:
    build: ./services/application-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  screening-service:
    build: ./services/screening-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    expose:
      - "8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  review-service:
    build: ./services/review-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    expose:
      - "8004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  award-service:
    build: ./services/award-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
    expose:
      - "8005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  reporting-service:
    build: ./services/reporting-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    expose:
      - "8006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  comms-service:
    build: ./services/comms-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
    expose:
      - "8007"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  admin-service:
    build: ./services/admin-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grantflow}:${POSTGRES_PASSWORD:-grantflow_secret}@postgres:5432/grantflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-grantflow-super-secret-key-for-hackathon}
    expose:
      - "8008"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantflow-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - grantflow-net

volumes:
  postgres_data:
  uploads_data:

networks:
  grantflow-net:
    driver: bridge
