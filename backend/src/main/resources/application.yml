server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/grantflow
    username: postgres
    password: argusadmin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: GrantFlowSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  file:
    upload-dir: ./uploads
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    org.grantflow: DEBUG
    org.springframework.security: INFO
